# If using docker for development:
# - Change target to: dev
# - Set NODE_ENV=development
# - Add these volumes to the service:
# volumes:
#   - .:/app
#   - /app/node_modules
#   - /app/.next

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    ports:
      - "3000:3000"
    # Runtime environment file. Override with `--env-file` or replace this
    # path for production deployments (e.g. `.env`, `.env.production`).
    # The file is gitignored — see `.env.example` for the documented contract.
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
