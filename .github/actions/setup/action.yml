name: Setup
description: Checkout, install pnpm + Node.js, and install dependencies (frozen lockfile).

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.30.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.22.2
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
